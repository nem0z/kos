apiVersion: v1
kind: Service
metadata:
  name: {{ include "kos.fullname" . }}-gateway
  labels:
    app: kos-gateway
spec:
  type: {{ .Values.gateway.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.gateway.service.port | default 80 }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: kos-gateway
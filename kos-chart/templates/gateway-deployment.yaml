apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kos.fullname" . }}-gateway
  labels:
    app: kos-gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: kos-gateway
  template:
    metadata:
      labels:
        app: kos-gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
    env:
      - name: DB_HOST
        value: {{ include "kos.fullname" . }}-valkey-master
      - name: STORAGE_NODE_ADDRESS
        value: {{ include "kos.fullname" . }}-node-headless